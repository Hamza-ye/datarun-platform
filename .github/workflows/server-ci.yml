name: Server CI

on:
  push:
    paths:
      - 'server/**'
      - 'contracts/**'
      - '.github/workflows/server-ci.yml'
  pull_request:
    paths:
      - 'server/**'
      - 'contracts/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: datarun_test
          POSTGRES_USER: datarun
          POSTGRES_PASSWORD: datarun
        ports:
          - 15432:5432
        options: >-
          --health-cmd "pg_isready -U datarun -d datarun_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Copy contracts to server classpath
        run: cp contracts/envelope.schema.json server/src/main/resources/envelope.schema.json

      - name: Build and test
        working-directory: server
        run: ./mvnw verify --batch-mode --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Verify contract schema exists
        run: |
          test -f contracts/envelope.schema.json || { echo "Missing envelope.schema.json"; exit 1; }
          test -f contracts/sync-protocol.md || { echo "Missing sync-protocol.md"; exit 1; }
