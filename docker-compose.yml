version: "3.9"

services:
  db:
    image: ghcr.io/vadosware/pg_idkit:0.2.3-pg16.2-alpine3.18-amd64
    environment:
      POSTGRES_DB: datarun
      POSTGRES_USER: datarun
      POSTGRES_PASSWORD: datarun
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datarun"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: datarun
      DB_USER: datarun
      DB_PASSWORD: datarun
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
