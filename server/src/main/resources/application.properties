spring.application.name=datarun-server

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:datarun}
spring.datasource.username=${DB_USER:datarun}
spring.datasource.password=${DB_PASSWORD:datarun}

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# Server
server.port=${SERVER_PORT:8080}
