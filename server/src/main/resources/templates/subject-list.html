<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datarun — Subjects</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 2rem; color: #1a1a1a; }
        h1 { font-size: 1.4rem; margin-bottom: 1rem; }
        table { border-collapse: collapse; width: 100%; }
        th, td { text-align: left; padding: 0.5rem 1rem; border-bottom: 1px solid #e0e0e0; }
        th { font-weight: 600; color: #666; font-size: 0.85rem; text-transform: uppercase; }
        a { color: #1a73e8; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .count { text-align: center; }
        .empty { color: #888; padding: 2rem; text-align: center; }
    </style>
</head>
<body>
    <h1>Subjects</h1>
    <table th:if="${!subjects.isEmpty()}">
        <thead>
            <tr>
                <th>Subject ID</th>
                <th>Latest Event</th>
                <th>Last Updated</th>
                <th class="count">Events</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="s : ${subjects}">
                <td><a th:href="@{/admin/subjects/{id}(id=${s.id()})}" th:text="${s.id()}">uuid</a></td>
                <td th:text="${s.latestEventType()}">capture</td>
                <td th:text="${s.latestTimestamp()}">2026-01-01</td>
                <td class="count" th:text="${s.eventCount()}">0</td>
            </tr>
        </tbody>
    </table>
    <p class="empty" th:if="${subjects.isEmpty()}">No subjects yet. Sync from a device to see data here.</p>
</body>
</html>
