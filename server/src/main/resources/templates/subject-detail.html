<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datarun — Subject Events</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 2rem; color: #1a1a1a; }
        h1 { font-size: 1.4rem; margin-bottom: 0.25rem; }
        .back { font-size: 0.9rem; margin-bottom: 1.5rem; display: inline-block; color: #1a73e8; text-decoration: none; }
        .back:hover { text-decoration: underline; }
        .event-card { border: 1px solid #e0e0e0; border-radius: 6px; padding: 1rem; margin-bottom: 1rem; }
        .event-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
        .event-type { font-weight: 600; }
        .event-time { color: #666; font-size: 0.85rem; }
        .event-meta { font-size: 0.8rem; color: #888; margin-bottom: 0.5rem; }
        .payload { background: #f5f5f5; padding: 0.75rem; border-radius: 4px; font-family: monospace; font-size: 0.85rem; white-space: pre-wrap; word-break: break-all; }
        .empty { color: #888; padding: 2rem; text-align: center; }
        .flag-badge { background: #d93025; color: #fff; font-size: 0.75rem; padding: 0.15rem 0.5rem; border-radius: 10px; margin-left: 0.5rem; }
        .flagged { border-color: #d93025; border-width: 2px; }
    </style>
</head>
<body>
    <a class="back" th:href="@{/admin}">&larr; All Subjects</a>
    <h1>Subject <span th:text="${subjectId}">uuid</span></h1>
    <p th:text="${events.size()} + ' event(s)'" style="color: #666; margin-bottom: 1.5rem;">0 event(s)</p>

    <div th:each="e : ${events}" class="event-card" th:classappend="${flaggedEventIds.contains(e.id().toString())} ? 'flagged' : ''">
        <div class="event-header">
            <span class="event-type" th:text="${e.type()}">capture</span>
            <span class="flag-badge" th:if="${flaggedEventIds.contains(e.id().toString())}">FLAGGED</span>
            <span class="event-time" th:text="${e.timestamp()}">2026-01-01</span>
        </div>
        <div class="event-meta">
            <span th:text="'Shape: ' + ${e.shapeRef()}">basic_capture/v1</span> ·
            <span th:text="'Device: ' + ${e.deviceId()}">device-uuid</span> ·
            <span th:text="'Seq: ' + ${e.deviceSeq()}">1</span> ·
            <span th:text="'Watermark: ' + ${e.syncWatermark()}">1</span>
        </div>
        <div class="payload" th:text="${e.payload()}">{ ... }</div>
    </div>

    <p class="empty" th:if="${events.isEmpty()}">No events for this subject.</p>
</body>
</html>
