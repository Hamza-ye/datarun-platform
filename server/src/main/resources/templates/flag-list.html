<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datarun — Unresolved Flags</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 2rem; color: #1a1a1a; }
        h1 { font-size: 1.4rem; margin-bottom: 1rem; }
        nav { margin-bottom: 1.5rem; font-size: 0.9rem; }
        nav a { color: #1a73e8; text-decoration: none; margin-right: 1.5rem; }
        nav a:hover { text-decoration: underline; }
        .success { background: #e6f4ea; color: #137333; padding: 0.75rem 1rem; border-radius: 6px; margin-bottom: 1rem; }
        .error { background: #fce8e6; color: #c5221f; padding: 0.75rem 1rem; border-radius: 6px; margin-bottom: 1rem; }
        table { border-collapse: collapse; width: 100%; }
        th, td { text-align: left; padding: 0.5rem 1rem; border-bottom: 1px solid #e0e0e0; }
        th { font-weight: 600; color: #666; font-size: 0.85rem; text-transform: uppercase; }
        a { color: #1a73e8; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .category { display: inline-block; font-size: 0.8rem; padding: 0.15rem 0.5rem; border-radius: 4px; font-weight: 500; }
        .category-concurrent { background: #fef7e0; color: #b06000; }
        .category-stale { background: #e8f0fe; color: #1a73e8; }
        .category-identity { background: #fce8e6; color: #c5221f; }
        .empty { color: #888; padding: 2rem; text-align: center; }
        .mono { font-family: monospace; font-size: 0.82rem; }
    </style>
</head>
<body>
    <nav>
        <a href="/admin">Subjects</a>
        <a href="/admin/flags"><strong>Flags</strong></a>
    </nav>
    <h1>Unresolved Flags</h1>

    <div class="success" th:if="${success}" th:text="${success}"></div>
    <div class="error" th:if="${error}" th:text="${error}"></div>

    <table th:if="${!flags.isEmpty()}">
        <thead>
            <tr>
                <th>Category</th>
                <th>Subject</th>
                <th>Source Event</th>
                <th>Flagged At</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="f : ${flags}">
                <td>
                    <span class="category"
                          th:classappend="${f.flagCategory() == 'concurrent_state_change'} ? 'category-concurrent' : (${f.flagCategory() == 'stale_reference'} ? 'category-stale' : 'category-identity')"
                          th:text="${f.flagCategory()}">concurrent_state_change</span>
                </td>
                <td class="mono">
                    <a th:href="@{/admin/subjects/{id}(id=${f.subjectId()})}"
                       th:text="${#strings.abbreviate(f.subjectId(), 13)}">uuid</a>
                </td>
                <td class="mono" th:text="${#strings.abbreviate(f.sourceEventId(), 13)}">uuid</td>
                <td th:text="${#temporals.format(f.flaggedAt(), 'yyyy-MM-dd HH:mm')}">2026-01-01</td>
                <td><a th:href="@{/admin/flags/{id}(id=${f.flagId()})}">Review</a></td>
            </tr>
        </tbody>
    </table>
    <p class="empty" th:if="${flags.isEmpty()}">No unresolved flags. All clear.</p>
</body>
</html>
