<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datarun — Create Assignment</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 2rem; color: #1a1a1a; }
        h1 { font-size: 1.4rem; margin-bottom: 1rem; }
        nav { margin-bottom: 1.5rem; font-size: 0.9rem; }
        nav a { color: #1a73e8; text-decoration: none; margin-right: 1.5rem; }
        .error { background: #fce8e6; color: #d93025; padding: 0.5rem 1rem; border-radius: 4px; margin-bottom: 1rem; }
        form { max-width: 500px; }
        label { display: block; font-weight: 600; font-size: 0.85rem; margin-top: 1rem; color: #555; }
        input, select { width: 100%; padding: 0.5rem; margin-top: 0.3rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; box-sizing: border-box; }
        .btn { display: inline-block; padding: 0.5rem 1.2rem; background: #1a73e8; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem; margin-top: 1.5rem; }
        .btn:hover { background: #1557b0; }
        .hint { font-size: 0.8rem; color: #888; margin-top: 0.2rem; }
    </style>
</head>
<body>
    <nav>
        <a href="/admin">Subjects</a>
        <a href="/admin/flags">Flags</a>
        <a href="/admin/assignments">Assignments</a>
        <a href="/admin/locations">Locations</a>
    </nav>
    <h1>Create Assignment</h1>
    <div class="error" th:if="${error}" th:text="${error}"></div>
    <form method="post" action="/admin/assignments/create">
        <label>Creator Actor ID</label>
        <input type="text" name="creatorActorId" required placeholder="UUID of the creating actor"/>
        <p class="hint">The actor creating this assignment. Must have containing scope (or be bootstrap).</p>

        <label>Target Actor ID</label>
        <input type="text" name="targetActorId" required placeholder="UUID of the actor being assigned"/>

        <label>Role</label>
        <input type="text" name="role" required placeholder="e.g. field_worker, supervisor"/>

        <label>Geographic Scope</label>
        <select name="geographicScope">
            <option value="">No geographic restriction</option>
            <option th:each="loc : ${locations}" th:value="${loc.id()}" th:text="${loc.path() + ' — ' + loc.name() + ' (' + loc.level() + ')'}">location</option>
        </select>

        <button type="submit" class="btn">Create Assignment</button>
    </form>
</body>
</html>
