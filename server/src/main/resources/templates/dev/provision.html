<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datarun — Provision Device</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 2rem; color: #1a1a1a; }
        h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
        .subtitle { color: #666; margin-bottom: 1.5rem; font-size: 0.9rem; }
        nav { margin-bottom: 1.5rem; font-size: 0.9rem; }
        nav a { color: #1a73e8; text-decoration: none; margin-right: 1.5rem; }
        nav a:hover { text-decoration: underline; }
        form { margin-bottom: 2rem; }
        label { display: block; margin-bottom: 0.3rem; font-weight: 600; font-size: 0.9rem; }
        select, input[type="text"] { padding: 0.4rem 0.6rem; font-size: 0.9rem; border: 1px solid #ccc; border-radius: 4px; min-width: 200px; }
        button { background: #1a73e8; color: #fff; border: none; padding: 0.5rem 1.2rem; border-radius: 4px; font-size: 0.9rem; cursor: pointer; margin-top: 0.5rem; }
        button:hover { background: #1557b0; }
        .result { background: #f0f7f0; border: 1px solid #4caf50; border-radius: 6px; padding: 1.2rem; margin-bottom: 1.5rem; }
        .result h2 { font-size: 1.1rem; color: #2e7d32; margin-top: 0; margin-bottom: 1rem; }
        .field { margin-bottom: 0.8rem; }
        .field-label { font-weight: 600; font-size: 0.85rem; color: #666; display: block; margin-bottom: 0.2rem; }
        .field-value { font-family: "SF Mono", Monaco, "Cascadia Code", monospace; font-size: 0.85rem; background: #fff; border: 1px solid #ddd; padding: 0.4rem 0.6rem; border-radius: 3px; display: block; word-break: break-all; user-select: all; }
        .hint { font-size: 0.8rem; color: #888; margin-top: 0.3rem; }
    </style>
</head>
<body>
    <nav>
        <a href="/admin">Subjects</a>
        <a href="/admin/flags">Flags</a>
        <a href="/admin/assignments">Assignments</a>
        <a href="/admin/config/shapes">Config</a>
        <a href="/admin/dev/provision" style="font-weight:600;">Dev Provision</a>
    </nav>

    <h1>Provision Device</h1>
    <p class="subtitle">Create an actor with token and root-scope assignment for dev testing.</p>

    <div th:if="${token}" class="result">
        <h2>Device provisioned</h2>
        <div class="field">
            <span class="field-label">Actor ID</span>
            <span class="field-value" th:text="${actorId}">—</span>
        </div>
        <div class="field">
            <span class="field-label">Token</span>
            <span class="field-value" th:text="${token}">—</span>
        </div>
        <div class="field">
            <span class="field-label">Role</span>
            <span class="field-value" th:text="${role}">—</span>
        </div>
        <p class="hint">Copy the token into the mobile app setup screen. This token won't be shown again.</p>
    </div>

    <form method="post" action="/admin/dev/provision">
        <div style="margin-bottom: 0.8rem;">
            <label for="role">Role</label>
            <select id="role" name="role">
                <option value="field_worker">field_worker</option>
                <option value="supervisor">supervisor</option>
                <option value="admin">admin</option>
            </select>
        </div>
        <button type="submit">Provision New Actor</button>
    </form>
</body>
</html>
