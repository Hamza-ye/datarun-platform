<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${shapeName + ' — Datarun Config'}">Shape Detail</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        th, td { border: 1px solid #ddd; padding: 0.5rem; text-align: left; }
        th { background: #f5f5f5; }
        .deprecated { opacity: 0.5; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; }
        .badge-active { background: #d4edda; color: #155724; }
        .badge-deprecated { background: #f8d7da; color: #721c24; }
        .success { background: #d4edda; padding: 0.5rem 1rem; border-radius: 4px; margin-bottom: 1rem; }
        .error { background: #f8d7da; padding: 0.5rem 1rem; border-radius: 4px; margin-bottom: 1rem; }
        textarea { font-family: monospace; width: 100%; min-height: 250px; padding: 0.4rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { padding: 0.4rem 1rem; border: none; border-radius: 4px; cursor: pointer; }
        .btn-primary { background: #0066cc; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        label { display: block; margin: 0.5rem 0 0.2rem; font-weight: 600; }
        select, input { padding: 0.4rem; border: 1px solid #ccc; border-radius: 4px; }
        nav { margin-bottom: 1rem; }
        a { color: #0066cc; }
        pre { background: #f5f5f5; padding: 1rem; border-radius: 4px; overflow-x: auto; font-size: 0.85em; }
        details { margin: 0.5rem 0; }
    </style>
</head>
<body>
    <nav>
        <a href="/admin">Admin</a> &gt;
        <a href="/admin/config/shapes">Shapes</a> &gt;
        <span th:text="${shapeName}"></span>
    </nav>

    <h1 th:text="${shapeName}"></h1>

    <div th:if="${success}" class="success" th:text="${success}"></div>
    <div th:if="${error}" class="error" th:text="${error}"></div>

    <h2>Versions</h2>
    <table>
        <thead>
            <tr>
                <th>Version</th>
                <th>Status</th>
                <th>Sensitivity</th>
                <th>Fields</th>
                <th>Created</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="shape : ${versions}" th:classappend="${shape.status() == 'deprecated'} ? 'deprecated'">
                <td th:text="${'v' + shape.version()}"></td>
                <td>
                    <span class="badge" th:classappend="${shape.status() == 'active'} ? 'badge-active' : 'badge-deprecated'"
                          th:text="${shape.status()}"></span>
                </td>
                <td th:text="${shape.sensitivity()}"></td>
                <td th:text="${shape.schemaJson().get('fields') != null ? shape.schemaJson().get('fields').size() : 0}"></td>
                <td th:text="${shape.createdAt()}"></td>
                <td>
                    <form th:if="${shape.status() == 'active'}"
                          th:action="@{/admin/config/shapes/{name}/v{v}/deprecate(name=${shapeName},v=${shape.version()})}"
                          method="post" style="display:inline;">
                        <button type="submit" class="btn-danger"
                                onclick="return confirm('Deprecate this version?')">Deprecate</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

    <div th:each="shape : ${versions}">
        <details>
            <summary th:text="${'v' + shape.version() + ' schema'}"></summary>
            <pre th:text="${shape.schemaJson().toPrettyString()}"></pre>
        </details>
    </div>

    <h2>Create New Version</h2>
    <form th:action="@{/admin/config/shapes/{name}/new-version(name=${shapeName})}" method="post">
        <label for="sensitivity">Sensitivity</label>
        <select id="sensitivity" name="sensitivity">
            <option value="standard" selected>standard</option>
            <option value="elevated">elevated</option>
            <option value="restricted">restricted</option>
        </select>

        <label for="schemaJsonStr">Schema JSON</label>
        <textarea id="schemaJsonStr" name="schemaJsonStr" required
                  th:text="${versions.get(versions.size() - 1).schemaJson().toPrettyString()}"></textarea>

        <button type="submit" class="btn-primary" style="margin-top: 0.5rem;">
            Create New Version
        </button>
    </form>
</body>
</html>
