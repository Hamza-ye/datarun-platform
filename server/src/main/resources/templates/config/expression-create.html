<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Expression Rule — Datarun Config</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        label { display: block; margin-top: 1rem; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 0.5rem; margin-top: 0.3rem; box-sizing: border-box; }
        textarea { font-family: monospace; min-height: 120px; }
        button { margin-top: 1.5rem; padding: 0.5rem 2rem; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .success { background: #d4edda; padding: 0.5rem 1rem; border-radius: 4px; margin-bottom: 1rem; }
        .error { background: #f8d7da; padding: 0.5rem 1rem; border-radius: 4px; margin-bottom: 1rem; }
        nav { margin-bottom: 1rem; }
        a { color: #0066cc; }
        .help { font-size: 0.85em; color: #666; margin-top: 0.2rem; }
    </style>
</head>
<body>
    <nav>
        <a href="/admin">Admin</a> &gt;
        <a href="/admin/config/expressions">Expressions</a> &gt;
        Create
    </nav>

    <h1>Create Expression Rule</h1>

    <div th:if="${success}" class="success" th:text="${success}"></div>
    <div th:if="${error}" class="error" th:text="${error}"></div>

    <form action="/admin/config/expressions/create" method="post">

        <label for="activityRef">Activity Reference</label>
        <select name="activityRef" id="activityRef" required>
            <option value="">— Select Activity —</option>
            <option th:each="a : ${activities}" th:value="${a.name()}" th:text="${a.name()}"></option>
        </select>

        <label for="shapeRef">Shape Reference</label>
        <select name="shapeRef" id="shapeRef" required>
            <option value="">— Select Shape —</option>
            <option th:each="s : ${shapes}" th:value="${s.shapeRef()}" th:text="${s.shapeRef()}"></option>
        </select>

        <label for="fieldName">Field Name</label>
        <input type="text" name="fieldName" id="fieldName" required placeholder="e.g. staff_present" />
        <div class="help">Must match a field name in the selected shape.</div>

        <label for="ruleType">Rule Type</label>
        <select name="ruleType" id="ruleType" required>
            <option value="show_condition">show_condition</option>
            <option value="warning">warning</option>
            <option value="default">default</option>
        </select>

        <label for="expressionStr">Expression (JSON)</label>
        <textarea name="expressionStr" id="expressionStr" required placeholder='{"when": {"eq": ["payload.status", "active"]}}'></textarea>
        <div class="help">
            show_condition/warning: <code>{"when": {condition}}</code><br/>
            default: <code>{"value": {expression}}</code>
        </div>

        <label for="message">Message (optional, for warnings)</label>
        <input type="text" name="message" id="message" placeholder="Warning text shown to the user" />

        <button type="submit">Create Rule</button>
    </form>
</body>
</html>
