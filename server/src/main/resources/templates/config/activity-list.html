<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Activities — Datarun Config</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        th, td { border: 1px solid #ddd; padding: 0.5rem; text-align: left; }
        th { background: #f5f5f5; }
        .deprecated { opacity: 0.5; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; }
        .badge-active { background: #d4edda; color: #155724; }
        .badge-deprecated { background: #f8d7da; color: #721c24; }
        .success { background: #d4edda; padding: 0.5rem 1rem; border-radius: 4px; margin-bottom: 1rem; }
        .error { background: #f8d7da; padding: 0.5rem 1rem; border-radius: 4px; margin-bottom: 1rem; }
        pre { background: #f5f5f5; padding: 0.5rem; border-radius: 4px; font-size: 0.85em; overflow-x: auto; }
        button { padding: 0.4rem 1rem; border: none; border-radius: 4px; cursor: pointer; }
        .btn-danger { background: #dc3545; color: white; }
        nav { margin-bottom: 1rem; }
        a { color: #0066cc; }
    </style>
</head>
<body>
    <nav>
        <a href="/admin">Admin</a> &gt;
        <a href="/admin/config/shapes">Shapes</a> |
        <a href="/admin/config/activities">Activities</a> |
        <a href="/admin/config/publish">Publish Config</a>
    </nav>

    <h1>Activities</h1>

    <div th:if="${success}" class="success" th:text="${success}"></div>
    <div th:if="${error}" class="error" th:text="${error}"></div>

    <p><a href="/admin/config/activities/create">+ Create new activity</a></p>

    <div th:if="${activities.isEmpty()}">
        <p>No activities defined yet.</p>
    </div>

    <table th:unless="${activities.isEmpty()}">
        <thead>
            <tr>
                <th>Name</th>
                <th>Status</th>
                <th>Sensitivity</th>
                <th>Config</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="activity : ${activities}" th:classappend="${activity.status() == 'deprecated'} ? 'deprecated'">
                <td th:text="${activity.name()}"></td>
                <td>
                    <span class="badge" th:classappend="${activity.status() == 'active'} ? 'badge-active' : 'badge-deprecated'"
                          th:text="${activity.status()}"></span>
                </td>
                <td th:text="${activity.sensitivity()}"></td>
                <td><pre th:text="${activity.configJson().toPrettyString()}"></pre></td>
                <td>
                    <form th:if="${activity.status() == 'active'}"
                          th:action="@{/admin/config/activities/{name}/deprecate(name=${activity.name()})}"
                          method="post" style="display:inline;">
                        <button type="submit" class="btn-danger"
                                onclick="return confirm('Deprecate this activity?')">Deprecate</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
