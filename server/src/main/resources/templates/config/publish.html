<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Publish Config — Datarun Config</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        .success { background: #d4edda; padding: 0.5rem 1rem; border-radius: 4px; margin-bottom: 1rem; }
        .error { background: #f8d7da; padding: 0.5rem 1rem; border-radius: 4px; margin-bottom: 1rem; }
        .info { background: #d1ecf1; padding: 0.5rem 1rem; border-radius: 4px; margin-bottom: 1rem; }
        button { padding: 0.5rem 1.5rem; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1.1em; }
        table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        th, td { border: 1px solid #ddd; padding: 0.5rem; text-align: left; }
        th { background: #f5f5f5; }
        nav { margin-bottom: 1rem; }
        a { color: #0066cc; }
        h2 { margin-top: 2rem; }
    </style>
</head>
<body>
    <nav>
        <a href="/admin">Admin</a> &gt;
        <a href="/admin/config/shapes">Shapes</a> |
        <a href="/admin/config/activities">Activities</a> |
        <a href="/admin/config/publish">Publish Config</a>
    </nav>

    <h1>Publish Configuration</h1>

    <div th:if="${success}" class="success" th:text="${success}"></div>
    <div th:if="${error}" class="error" th:text="${error}"></div>

    <div class="info">
        Current published version: <strong th:text="${currentVersion}">0</strong>
        <span th:if="${currentVersion == 0}"> (none published yet)</span>
    </div>

    <h2>Configuration Summary</h2>

    <h3>Shapes (<span th:text="${shapes.size()}">0</span>)</h3>
    <table th:unless="${shapes.isEmpty()}">
        <thead><tr><th>Shape Ref</th><th>Status</th><th>Fields</th></tr></thead>
        <tbody>
            <tr th:each="s : ${shapes}">
                <td th:text="${s.shapeRef()}"></td>
                <td th:text="${s.status()}"></td>
                <td th:text="${s.schemaJson().get('fields') != null ? s.schemaJson().get('fields').size() : 0}"></td>
            </tr>
        </tbody>
    </table>

    <h3>Activities (<span th:text="${activities.size()}">0</span>)</h3>
    <table th:unless="${activities.isEmpty()}">
        <thead><tr><th>Name</th><th>Status</th></tr></thead>
        <tbody>
            <tr th:each="a : ${activities}">
                <td th:text="${a.name()}"></td>
                <td th:text="${a.status()}"></td>
            </tr>
        </tbody>
    </table>

    <form method="post" action="/admin/config/publish" style="margin-top: 2rem;">
        <button type="submit" onclick="return confirm('Publish new config version?')">
            Publish Config v<span th:text="${currentVersion + 1}">1</span>
        </button>
    </form>
</body>
</html>
