<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Shape — Datarun Config</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        label { display: block; margin: 0.5rem 0 0.2rem; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 0.4rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        textarea { font-family: monospace; min-height: 300px; }
        button { margin-top: 1rem; padding: 0.5rem 1.5rem; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .error { background: #f8d7da; padding: 0.5rem 1rem; border-radius: 4px; margin-bottom: 1rem; }
        .hint { font-size: 0.85em; color: #666; margin-top: 0.2rem; }
        nav { margin-bottom: 1rem; }
        a { color: #0066cc; }
    </style>
</head>
<body>
    <nav>
        <a href="/admin">Admin</a> &gt;
        <a href="/admin/config/shapes">Shapes</a> &gt; Create
    </nav>

    <h1>Create Shape</h1>

    <div th:if="${error}" class="error" th:text="${error}"></div>

    <form method="post" action="/admin/config/shapes/create">
        <label for="name">Shape Name</label>
        <input type="text" id="name" name="name" pattern="[a-z][a-z0-9_]*" required
               placeholder="e.g. household_visit" />
        <p class="hint">Lowercase, underscores allowed. Must start with letter.</p>

        <label for="sensitivity">Sensitivity</label>
        <select id="sensitivity" name="sensitivity">
            <option value="standard" selected>standard</option>
            <option value="elevated">elevated</option>
            <option value="restricted">restricted</option>
        </select>

        <label for="schemaJsonStr">Schema JSON</label>
        <textarea id="schemaJsonStr" name="schemaJsonStr" required>{
  "fields": [
    {
      "name": "example_field",
      "type": "text",
      "required": true,
      "description": "An example field",
      "display_order": 1,
      "group": null,
      "deprecated": false,
      "options": null,
      "validation": null
    }
  ],
  "subject_binding": null,
  "uniqueness": null
}</textarea>
        <p class="hint">
            Valid types: <span th:each="t,iter : ${validTypes}"><code th:text="${t}"></code><span th:unless="${iter.last}">, </span></span>
        </p>

        <button type="submit">Create Shape v1</button>
    </form>
</body>
</html>
