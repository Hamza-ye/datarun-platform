<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Expression Rules — Datarun Config</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }
        table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        th, td { border: 1px solid #ddd; padding: 0.5rem; text-align: left; }
        th { background: #f5f5f5; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; }
        .badge-show { background: #d4edda; color: #155724; }
        .badge-warning { background: #fff3cd; color: #856404; }
        .badge-default { background: #d1ecf1; color: #0c5460; }
        .success { background: #d4edda; padding: 0.5rem 1rem; border-radius: 4px; margin-bottom: 1rem; }
        .error { background: #f8d7da; padding: 0.5rem 1rem; border-radius: 4px; margin-bottom: 1rem; }
        pre { background: #f5f5f5; padding: 0.5rem; border-radius: 4px; font-size: 0.8em; overflow-x: auto; max-width: 400px; }
        button { padding: 0.4rem 1rem; border: none; border-radius: 4px; cursor: pointer; }
        .btn-danger { background: #dc3545; color: white; }
        nav { margin-bottom: 1rem; }
        a { color: #0066cc; }
    </style>
</head>
<body>
    <nav>
        <a href="/admin">Admin</a> &gt;
        <a href="/admin/config/shapes">Shapes</a> |
        <a href="/admin/config/activities">Activities</a> |
        <a href="/admin/config/expressions">Expressions</a> |
        <a href="/admin/config/publish">Publish Config</a>
    </nav>

    <h1>Expression Rules</h1>

    <div th:if="${success}" class="success" th:text="${success}"></div>
    <div th:if="${error}" class="error" th:text="${error}"></div>

    <p><a href="/admin/config/expressions/create">+ Create new expression rule</a></p>

    <div th:if="${rules.isEmpty()}">
        <p>No expression rules defined yet.</p>
    </div>

    <table th:unless="${rules.isEmpty()}">
        <thead>
            <tr>
                <th>Activity</th>
                <th>Shape</th>
                <th>Field</th>
                <th>Type</th>
                <th>Expression</th>
                <th>Message</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="rule : ${rules}">
                <td th:text="${rule.activityRef()}"></td>
                <td th:text="${rule.shapeRef()}"></td>
                <td th:text="${rule.fieldName()}"></td>
                <td>
                    <span class="badge badge-show" th:if="${rule.ruleType() == 'show_condition'}" th:text="${rule.ruleType()}"></span>
                    <span class="badge badge-warning" th:if="${rule.ruleType() == 'warning'}" th:text="${rule.ruleType()}"></span>
                    <span class="badge badge-default" th:if="${rule.ruleType() == 'default'}" th:text="${rule.ruleType()}"></span>
                </td>
                <td><pre th:text="${rule.expression().toPrettyString()}"></pre></td>
                <td th:text="${rule.message()}"></td>
                <td>
                    <form th:action="@{'/admin/config/expressions/' + ${rule.id()} + '/delete'}" method="post" style="display:inline">
                        <button type="submit" class="btn-danger" onclick="return confirm('Delete this rule?')">Delete</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
