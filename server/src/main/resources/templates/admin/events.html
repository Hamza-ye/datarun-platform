<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Datarun admin — events</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 2rem; font-size: 13px; }
        nav a { margin-right: 1rem; }
        table { border-collapse: collapse; width: 100%; }
        th, td { padding: 4px 8px; border: 1px solid #ddd; text-align: left; vertical-align: top; }
        th { background: #f5f5f5; }
        tr.flag td { background: #fff4f4; }
        tr.alert td { background: #fff4f4; }
        .small { color: #666; font-size: 11px; }
        pre { margin: 0; white-space: pre-wrap; word-break: break-all; max-width: 400px; }
    </style>
</head>
<body>
<nav>
    <a href="/admin/events">Events</a>
    <a href="/admin/flags">Flags</a>
</nav>
<h1>All events</h1>
<p class="small">Append-only stream. Ordered by sync_watermark ascending.</p>
<table>
    <thead>
    <tr>
        <th>wm</th><th>type</th><th>shape_ref</th><th>activity_ref</th>
        <th>subject</th><th>actor</th><th>device_id / seq</th><th>timestamp</th><th>payload</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="e : ${events}" th:classappend="${e.type == 'alert'} ? 'alert' : ''">
        <td th:text="${e.syncWatermark}"></td>
        <td th:text="${e.type}"></td>
        <td th:text="${e.shapeRef}"></td>
        <td th:text="${e.activityRef}"></td>
        <td>
            <span th:text="${e.subjectType}"></span><br/>
            <span class="small" th:text="${e.subjectId}"></span>
        </td>
        <td><span class="small" th:text="${e.actorId}"></span></td>
        <td>
            <span class="small" th:text="${e.deviceId}"></span>
            <br/>seq=<span th:text="${e.deviceSeq}"></span>
        </td>
        <td class="small" th:text="${e.timestamp}"></td>
        <td><pre th:text="${e.payload.toString()}"></pre></td>
    </tr>
    </tbody>
</table>
</body>
</html>
