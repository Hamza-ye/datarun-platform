<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datarun — Locations</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 2rem; color: #1a1a1a; }
        h1 { font-size: 1.4rem; margin-bottom: 1rem; }
        nav { margin-bottom: 1.5rem; font-size: 0.9rem; }
        nav a { color: #1a73e8; text-decoration: none; margin-right: 1.5rem; }
        table { border-collapse: collapse; width: 100%; }
        th, td { text-align: left; padding: 0.5rem 1rem; border-bottom: 1px solid #e0e0e0; font-size: 0.9rem; }
        th { font-weight: 600; color: #666; font-size: 0.85rem; text-transform: uppercase; }
        .mono { font-family: monospace; font-size: 0.8rem; }
        .empty { color: #888; padding: 2rem; text-align: center; }
    </style>
</head>
<body>
    <nav>
        <a href="/admin">Subjects</a>
        <a href="/admin/flags">Flags</a>
        <a href="/admin/assignments">Assignments</a>
        <a href="/admin/locations">Locations</a>
    </nav>
    <h1>Location Hierarchy</h1>
    <table th:if="${!locations.isEmpty()}">
        <thead>
            <tr>
                <th>Path</th>
                <th>Name</th>
                <th>Level</th>
                <th>ID</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="loc : ${locations}">
                <td class="mono" th:text="${loc.path()}">path</td>
                <td th:text="${loc.name()}">name</td>
                <td th:text="${loc.level()}">level</td>
                <td class="mono" th:text="${loc.id()}">uuid</td>
            </tr>
        </tbody>
    </table>
    <p class="empty" th:if="${locations.isEmpty()}">No locations. Use the API to create locations: POST /api/locations</p>
</body>
</html>
