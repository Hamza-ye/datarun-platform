<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datarun — Assignments</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 2rem; color: #1a1a1a; }
        h1 { font-size: 1.4rem; margin-bottom: 1rem; }
        nav { margin-bottom: 1.5rem; font-size: 0.9rem; }
        nav a { color: #1a73e8; text-decoration: none; margin-right: 1.5rem; }
        nav a:hover { text-decoration: underline; }
        .success { background: #e6f4ea; color: #1e8e3e; padding: 0.5rem 1rem; border-radius: 4px; margin-bottom: 1rem; }
        .error { background: #fce8e6; color: #d93025; padding: 0.5rem 1rem; border-radius: 4px; margin-bottom: 1rem; }
        table { border-collapse: collapse; width: 100%; }
        th, td { text-align: left; padding: 0.5rem 1rem; border-bottom: 1px solid #e0e0e0; font-size: 0.9rem; }
        th { font-weight: 600; color: #666; font-size: 0.85rem; text-transform: uppercase; }
        a { color: #1a73e8; text-decoration: none; }
        .btn { display: inline-block; padding: 0.3rem 0.8rem; background: #1a73e8; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; text-decoration: none; }
        .btn:hover { background: #1557b0; }
        .btn-danger { background: #d93025; }
        .btn-danger:hover { background: #b3261e; }
        .mono { font-family: monospace; font-size: 0.8rem; }
        .empty { color: #888; padding: 2rem; text-align: center; }
    </style>
</head>
<body>
    <nav>
        <a href="/admin">Subjects</a>
        <a href="/admin/flags">Flags</a>
        <a href="/admin/assignments">Assignments</a>
        <a href="/admin/locations">Locations</a>
    </nav>
    <h1>Assignments</h1>
    <div class="success" th:if="${success}" th:text="${success}"></div>
    <div class="error" th:if="${error}" th:text="${error}"></div>
    <p><a href="/admin/assignments/create" class="btn">Create Assignment</a></p>
    <table th:if="${!events.isEmpty()}">
        <thead>
            <tr>
                <th>Shape</th>
                <th>Assignment ID</th>
                <th>Target Actor</th>
                <th>Role</th>
                <th>Geographic</th>
                <th>Created By</th>
                <th>Timestamp</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="e : ${events}">
                <td th:text="${e.shapeRef()}">shape</td>
                <td class="mono" th:text="${e.subjectRef().get('id').asText().substring(0, 8) + '…'}">uuid</td>
                <td class="mono" th:text="${e.payload().has('target_actor') ? e.payload().get('target_actor').get('id').asText().substring(0, 8) + '…' : '—'}">actor</td>
                <td th:text="${e.payload().has('role') ? e.payload().get('role').asText() : '—'}">role</td>
                <td class="mono" th:text="${e.payload().has('scope') and e.payload().get('scope').has('geographic') and !e.payload().get('scope').get('geographic').isNull() ? e.payload().get('scope').get('geographic').asText().substring(0, 8) + '…' : '—'}">geo</td>
                <td class="mono" th:text="${e.actorRef().get('id').asText().substring(0, 8) + '…'}">actor</td>
                <td th:text="${e.timestamp()}">time</td>
            </tr>
        </tbody>
    </table>
    <p class="empty" th:if="${events.isEmpty()}">No assignments yet.</p>
</body>
</html>
